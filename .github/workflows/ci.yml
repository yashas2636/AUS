name: CI/CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: registry.gitlab.com
  IMAGE: registry.gitlab.com/connective-au/devops/application-images/fibonacci-service
  YQ_VERSION: "v4.44.2"       # pinned — never download unpinned binaries in CI

jobs:
  # ── 1. Build, test, dependency CVE scan ──────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and run all tests
        run: mvn verify -Dspring.profiles.active=test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

      # Fail the build if any dependency has a CVSS score >= 9 (critical)
      - name: OWASP dependency CVE check
        run: mvn org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9 -DnvdApiKey=${{ secrets.NVD_API_KEY }}
        continue-on-error: false

  # ── 2. Docker build, vulnerability scan, push ────────────────────────────────
  docker:
    name: Docker Build & Scan & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx (required for BuildKit cache mounts)
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitLab registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_TOKEN }}

      - name: Build image (push deferred until after scan)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          # Load into local daemon for Trivy scan — push after scan passes
          load: true
          push: false
          tags: ${{ env.IMAGE }}:scan-candidate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.IMAGE }}:scan-candidate
          format: table
          exit-code: 1                  # fail CI on critical/high unfixed CVEs
          severity: CRITICAL,HIGH
          ignore-unfixed: true          # unfixed CVEs in base image are noise
          vuln-type: os,library

      # Only push if scan passes
      - name: Push image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'main-latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # BUG FIX: digest must come from build output, not from docker inspect
      # (docker inspect would run before the image exists)
      - name: Compute immutable image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Immutable tag for test/prod promotion: v1.0.0@sha256:<digest>
            echo "tag=${GITHUB_REF_NAME}@${{ steps.push.outputs.digest }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=main-latest" >> "$GITHUB_OUTPUT"
          fi

  # ── 3. Update GitOps → ArgoCD syncs to test cluster ─────────────────────────
  update-gitops:
    name: Update GitOps image tag
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # Pinned version — never download latest in CI
      - name: Install yq ${{ env.YQ_VERSION }}
        run: |
          wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Update test overlay image tag
        env:
          APPLICATION_NAME: fibonacci-service
          ENVIRONMENT: test
          IMAGE_TAG: ${{ needs.docker.outputs.image_tag }}
        run: bash scripts/update-image-tag.sh

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump fibonacci-service [${{ needs.docker.outputs.image_tag }}] [skip ci]"
          git push
