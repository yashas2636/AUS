version: "3.9"

services:
  fibonacci-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: fibonacci-service:local
    container_name: fibonacci-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NEW_RELIC_LICENSE_KEY=${NEW_RELIC_LICENSE_KEY:-}
      - NEW_RELIC_APP_NAME=fibonacci-service
      - NR_ACCOUNT_ID=${NR_ACCOUNT_ID:-}
      - NR_API_KEY=${NR_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
