spring.application.name=fibonacci-service
server.port=8080

# ---------- Tomcat thread pool ----------
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=20
server.tomcat.accept-count=500
server.tomcat.connection-timeout=5s
# Reject oversized headers (protects against header injection / smuggling attacks)
server.tomcat.max-http-header-size=8KB
# Reject oversized URLs (protects against long query string attacks)
server.tomcat.max-http-form-post-size=1MB

# ---------- Graceful shutdown (matches SERVER_SHUTDOWN in config.env) ----------
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=60s

# ---------- Rate limiting ----------
rate.limit.requests-per-minute=200

# ---------- Actuator ----------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
# Explicit liveness/readiness groups — required for /actuator/health/liveness and /readiness
# to return 200/503 correctly so Kubernetes probes work as expected.
management.endpoint.health.group.liveness.include=livenessState
management.endpoint.health.group.readiness.include=readinessState
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=@project.version@

# ---------- Cache ----------
spring.cache.type=caffeine

# ---------- Metrics tags — applied to every metric exported to NR/Prometheus ─
# Allows filtering by service/env in NR dashboards and alert conditions.
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${SPRING_PROFILES_ACTIVE:local}

# ---------- Logging ----------
logging.level.com.bentley.fibonacci=INFO
logging.level.org.springframework.web=WARN
