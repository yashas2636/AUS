# Local development — run with: mvn spring-boot:run -Dspring-boot.run.profiles=local
# or: java -Dspring.profiles.active=local -jar target/fibonacci-1.0.0.jar
server.port=8080
rate.limit.requests-per-minute=100000

logging.level.com.bentley.fibonacci=DEBUG
logging.level.org.springframework.web=DEBUG

management.newrelic.metrics.export.enabled=false

# Relax startup so local dev starts fast
management.endpoint.health.show-details=always
